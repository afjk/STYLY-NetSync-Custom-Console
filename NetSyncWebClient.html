<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STYLY NetSync Console</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #0f1115;
    color: #e8edf2;
    overflow: hidden;
  }
  button, input, select { font: inherit; }
  button {
    border: 1px solid #3a414d;
    background: #202734;
    color: #e8edf2;
    border-radius: 6px;
    padding: 7px 12px;
    cursor: pointer;
  }
  button:hover { background: #2a3342; }
  button.primary { background: #2367d1; border-color: #2b74df; }
  button.primary:hover { background: #2b74df; }
  input, select {
    min-width: 0;
    border: 1px solid #303846;
    background: #151922;
    color: #e8edf2;
    border-radius: 6px;
    padding: 7px 9px;
    outline: none;
  }
  input:focus, select:focus { border-color: #4f8cff; }
  .app {
    height: 100vh;
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto auto 1fr;
  }
  .topbar {
    display: grid;
    grid-template-columns: auto minmax(240px, 1fr) auto auto;
    gap: 10px;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #252b35;
    background: #151922;
  }
  .brand {
    font-size: 16px;
    font-weight: 700;
    color: #c7d2e0;
    white-space: nowrap;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: #aab4c0;
    font-size: 12px;
    white-space: nowrap;
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 99px;
    background: #d84a4a;
  }
  .dot.ok { background: #39c16c; }
  .url-tools {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto auto auto;
    gap: 8px;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(120px, 1fr));
    gap: 1px;
    background: #252b35;
    border-bottom: 1px solid #252b35;
  }
  .metric {
    background: #11151d;
    padding: 12px 16px;
  }
  .metric-label {
    color: #8f9aaa;
    font-size: 11px;
    margin-bottom: 5px;
  }
  .metric-value {
    font-size: 26px;
    line-height: 1;
    font-weight: 700;
  }
  .main {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(520px, 1fr) 380px;
    overflow: hidden;
  }
  .panel {
    min-height: 0;
    border-right: 1px solid #252b35;
    display: grid;
    grid-template-rows: auto minmax(180px, 1fr) 360px;
    overflow: hidden;
  }
  .side {
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto minmax(160px, 260px) auto 1fr;
    background: #11151d;
  }
  .section-head {
    min-height: 49px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid #252b35;
  }
  .section-head h2 {
    margin: 0;
    font-size: 13px;
    font-weight: 650;
  }
  .filters {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filters input { width: 260px; }
  .watch-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .watch-controls input { width: 180px; }
  .watch-list {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .watch-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid #303846;
    background: #151922;
    border-radius: 999px;
    color: #dbe4ee;
    padding: 3px 8px;
    font-size: 11px;
  }
  .watch-chip button {
    border: 0;
    background: transparent;
    color: #8f9aaa;
    width: 22px;
    height: 22px;
    min-width: 22px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .watch-chip button:hover { background: #252d3a; color: #e8edf2; }
  .watched-value {
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .grid-wrap {
    min-height: 0;
    overflow: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    border-bottom: 1px solid #202631;
    padding: 11px 12px;
    text-align: left;
    font-size: 12px;
    white-space: nowrap;
  }
  th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #171c26;
    color: #8f9aaa;
    font-weight: 600;
  }
  tbody tr {
    cursor: pointer;
    height: 42px;
    user-select: none;
  }
  tbody tr:hover { background: #192130; }
  tbody tr.selected { background: #22304a; }
  .mono {
    font-family: "SF Mono", Consolas, monospace;
    font-size: 12px;
  }
  .device {
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #8cbcff;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 2px 7px;
    font-size: 11px;
    color: #aab4c0;
    background: #202734;
  }
  .pill.active { color: #87e1aa; background: #143522; }
  .pill.stealth { color: #ffd37a; background: #3b2b13; }
  .map-wrap {
    min-height: 0;
    border-top: 1px solid #252b35;
    background: #0c1017;
    overflow: hidden;
  }
  .map-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #202631;
    background: #101621;
  }
  .map-tools .group {
    display: inline-flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .map-tools input {
    width: 86px;
  }
  .dummy-count {
    color: #aab4c0;
    font-size: 12px;
  }
  .dummy-count strong {
    color: #ffd37a;
    font-size: 14px;
  }
  .dummy-selection {
    color: #c7d2e0;
    font-size: 12px;
  }
  .dummy-selection strong {
    color: #ffffff;
  }
  #avatar-canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 1200 / 320;
    cursor: pointer;
  }
  .detail-empty {
    color: #687386;
    padding: 18px;
    font-size: 13px;
  }
  .detail-body {
    min-height: 0;
    overflow: auto;
    padding: 14px;
  }
  .side-global {
    min-height: 0;
    overflow: auto;
    border-bottom: 1px solid #252b35;
  }
  .kv {
    display: grid;
    grid-template-columns: 96px minmax(0, 1fr);
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid #202631;
    font-size: 12px;
  }
  .kv .k { color: #8f9aaa; }
  .kv .v { overflow-wrap: anywhere; }
  .vars {
    margin-top: 14px;
  }
  .vars h3 {
    margin: 0 0 8px;
    color: #aab4c0;
    font-size: 12px;
    font-weight: 650;
  }
  .editor {
    display: grid;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #252b35;
  }
  .editor-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
  }
  .inline-edit {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) auto auto;
    gap: 6px;
    align-items: center;
  }
  .inline-edit input {
    width: 100%;
  }
  .table-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .global {
    padding: 12px 14px;
    border-top: 1px solid #252b35;
    background: #11151d;
    display: none;
  }
  .global-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .global-head h2 {
    margin: 0;
    font-size: 13px;
  }
  .global-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 10px;
  }
  .global-list {
    max-height: 120px;
    overflow: auto;
    border: 1px solid #202631;
    border-radius: 6px;
  }
  .empty {
    padding: 14px;
    color: #687386;
    font-size: 12px;
  }
  .toast {
    position: fixed;
    left: 16px;
    bottom: 16px;
    max-width: min(420px, calc(100vw - 32px));
    background: #151922;
    border: 1px solid #303846;
    border-radius: 8px;
    padding: 10px 12px;
    color: #dbe4ee;
    font-size: 12px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .15s ease, transform .15s ease;
    pointer-events: none;
  }
  .toast.has-link {
    pointer-events: auto;
  }
  .toast a {
    color: #8fb7ff;
    margin-left: 8px;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  @media (max-width: 980px) {
    .topbar { grid-template-columns: 1fr; }
    .url-tools { grid-template-columns: 1fr auto auto; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .main { grid-template-columns: 1fr; }
    .panel { border-right: 0; }
    .side { min-height: 420px; border-top: 1px solid #252b35; }
  }
  @media (max-width: 620px), (max-width: 980px) and (max-height: 520px) {
    body { overflow: auto; }
    .app {
      height: auto;
      min-height: 100dvh;
      grid-template-rows: auto auto auto;
    }
    .topbar,
    .section-head,
    .global-head {
      align-items: stretch;
    }
    .url-tools, .global-grid, .editor-row { grid-template-columns: 1fr; }
    #ws-url-candidates,
    .status,
    .watch-controls,
    .watch-controls input,
    .watch-controls button,
    .global-grid button,
    .editor-row button {
      width: 100%;
    }
    .filters { width: 100%; }
    .filters input { width: 100%; }
    .main {
      overflow: visible;
    }
    .panel,
    .side {
      overflow: visible;
    }
    .panel {
      grid-template-rows: auto minmax(240px, auto) auto;
    }
    .side {
      min-height: 0;
      grid-template-rows: auto auto auto auto;
    }
    .grid-wrap,
    .side-global,
    .detail-body {
      overflow: visible;
    }
    .map-wrap {
      overflow-x: auto;
    }
    .kv {
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .inline-edit {
      grid-template-columns: 1fr;
    }
    .table-actions {
      flex-wrap: wrap;
    }
    .col-position {
      display: none;
    }
  }
  @media (min-width: 981px) and (max-height: 900px) {
    body { overflow: auto; }
    .app {
      height: auto;
      min-height: 100dvh;
      grid-template-rows: auto auto auto;
    }
    .main,
    .panel,
    .side {
      overflow: visible;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">STYLY NetSync Console</div>
    <div class="url-tools">
      <input type="text" id="ws-url" value="" aria-label="Bridge URL">
      <button class="primary" onclick="connect()">Connect</button>
      <button onclick="disconnect()">Disconnect</button>
      <button type="button" onclick="openViewer3d()">3D View</button>
    </div>
    <select id="ws-url-candidates" aria-label="Saved URLs"></select>
    <div class="status"><span id="status-dot" class="dot"></span><span id="status-text">Disconnected</span></div>
  </header>

  <section class="summary">
    <div class="metric"><div class="metric-label">Participants</div><div class="metric-value" id="stat-room-clients">0</div></div>
    <div class="metric"><div class="metric-label">Pose</div><div class="metric-value" id="stat-pose-clients">0</div></div>
    <div class="metric"><div class="metric-label">Web</div><div class="metric-value" id="stat-web-clients">0</div></div>
    <div class="metric"><div class="metric-label">Variables</div><div class="metric-value" id="stat-var-count">0</div></div>
  </section>

  <main class="main">
    <section class="panel">
      <div class="section-head">
        <h2>Participants</h2>
        <div class="filters">
          <input type="text" id="client-filter" placeholder="Filter" oninput="renderAll()">
          <div class="watch-controls">
            <input type="text" id="watch-var-name" placeholder="Client Variable">
            <button onclick="addWatchedClientVar()">Watch</button>
          </div>
          <div class="watch-list" id="watch-var-list"></div>
          <button type="button" class="refresh-btn">Refresh</button>
        </div>
      </div>
      <div class="grid-wrap" id="participants-grid"></div>
      <div class="map-wrap">
        <div class="section-head"><h2>Map</h2><span id="map-caption" class="mono">0</span></div>
        <div class="map-tools">
          <div class="group">
            <span class="dummy-count">Dummies: <strong id="dummy-count">0</strong></span>
          </div>
          <div class="group">
            <input type="number" id="dummy-spawn-count" value="20" min="1" placeholder="Count">
            <input type="number" id="dummy-center-x" value="0" step="0.1" placeholder="Center X">
            <input type="number" id="dummy-center-z" value="0" step="0.1" placeholder="Center Z">
            <input type="number" id="dummy-radius" value="5" min="0" step="0.1" placeholder="Radius">
          </div>
          <div class="group">
            <button type="button" id="spawn-btn" onclick="spawnDummies()">Spawn</button>
            <button type="button" onclick="spawnDummies(50)">+50</button>
            <button type="button" onclick="spawnDummies(100)">+100</button>
            <button type="button" onclick="despawnDummies()">Despawn All</button>
          </div>
          <div class="group">
            <span class="dummy-selection" id="dummy-selection-label">Selected: <strong>(none)</strong></span>
            <button type="button" id="dummy-remove-btn" onclick="removeSelectedDummy()" disabled>Remove</button>
            <button type="button" id="dummy-deselect-btn" onclick="deselectDummy()" disabled>Deselect</button>
          </div>
        </div>
        <canvas id="avatar-canvas" width="1200" height="320"></canvas>
      </div>
    </section>

    <aside class="side">
      <div class="section-head">
        <h2>Global Variables</h2>
        <button type="button" class="refresh-btn">Refresh</button>
      </div>
      <div class="side-global">
        <div class="global-grid" style="padding:12px 14px 0">
          <input type="text" id="set-gv-name" placeholder="name">
          <input type="text" id="set-gv-value" placeholder="value">
          <button onclick="setGlobalVar()">Set</button>
        </div>
        <div class="global-list" id="global-vars-display" style="margin:12px 14px"></div>
      </div>
      <div class="section-head">
        <h2 id="detail-title">Client Details</h2>
        <button onclick="clearSelection()">Clear</button>
      </div>
      <div class="detail-body" id="detail-body">
        <div class="detail-empty">Select a participant.</div>
      </div>
    </aside>
  </main>
</div>
<div id="toast" class="toast"></div>

<script>
let ws = null;
let clients = {};
let idMappings = {};
let globalVars = {};
let clientVars = {};
let selectedClientNo = null;
let roomSummary = { roomClientCount: 0, poseClientCount: 0, stealthClientCount: 0, webClientCount: 0, maxRecommendedClients: 100 };
let preserveDetailRenderUntil = 0;
let preserveGlobalRenderUntil = 0;
let mapHitTargets = [];
let dummyCount = 0;
let canvasView = { centerX: 0, centerZ: 0, scale: 40 };
let mapCommandMarkers = [];
let mapRedrawFrame = 0;
let dummies = [];
let selectedDummyIndex = null;
let spawnMode = false;
let spawnPreviewWorld = null;

const BRIDGE_URL_STORAGE_KEY = "styly-netsync-bridge-url";
const BRIDGE_URL_HISTORY_KEY = "styly-netsync-bridge-url-history";
const WATCHED_CLIENT_VARS_STORAGE_KEY = "styly-netsync-watched-client-vars";
const MAX_BRIDGE_URL_HISTORY = 8;
const BRIDGE_START_GUIDE_URL = "https://github.com/afjk/STYLY-NetSync-Custom-Console/blob/main/README.ja.md#%E8%B5%B7%E5%8B%95";
let watchedClientVars = [];

function isConnected() {
  return !!ws && ws.readyState === 1;
}

function esc(value) {
  const d = document.createElement("div");
  d.textContent = value == null ? "" : String(value);
  return d.innerHTML;
}

function toast(message, isError = false, duration = 1800, link = null) {
  const el = document.getElementById("toast");
  el.textContent = message;
  el.classList.toggle("has-link", !!link);
  if (link) {
    const anchor = document.createElement("a");
    anchor.href = link.href;
    anchor.textContent = link.label;
    anchor.target = "_blank";
    anchor.rel = "noopener noreferrer";
    el.appendChild(anchor);
  }
  el.style.borderColor = isError ? "#7d3434" : "#303846";
  el.classList.add("show");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => el.classList.remove("show"), duration);
}

function setStatus(ok) {
  document.getElementById("status-dot").className = "dot" + (ok ? " ok" : "");
  document.getElementById("status-text").textContent = ok ? "Connected" : "Disconnected";
}

function normalizeBridgeUrl(rawUrl) {
  const trimmed = (rawUrl || "").trim();
  if (!trimmed) return "";
  return /^wss?:\/\//i.test(trimmed) ? trimmed : `ws://${trimmed}`;
}

function isStaticPageHost(hostname) {
  return hostname === "github.io" || hostname.endsWith(".github.io");
}

function isBridgeUrlCandidate(rawUrl) {
  const normalized = normalizeBridgeUrl(rawUrl);
  if (!normalized) return false;
  try {
    const parsed = new URL(normalized);
    return !isStaticPageHost(parsed.hostname);
  } catch {
    return false;
  }
}

function getBridgeHistory() {
  try {
    const parsed = JSON.parse(localStorage.getItem(BRIDGE_URL_HISTORY_KEY) || "[]");
    return Array.isArray(parsed) ? parsed.filter(isBridgeUrlCandidate) : [];
  } catch {
    return [];
  }
}

function getDefaultBridgeCandidates() {
  const defaults = [];
  if (
    location.hostname
    && location.hostname !== "localhost"
    && location.hostname !== "127.0.0.1"
    && !isStaticPageHost(location.hostname)
  ) {
    defaults.push(`ws://${location.hostname}:8765`);
  }
  defaults.push("ws://localhost:8765");
  return defaults;
}

function renderBridgeUrlCandidates() {
  const select = document.getElementById("ws-url-candidates");
  const urls = Array.from(new Set([...getBridgeHistory(), ...getDefaultBridgeCandidates()].map(normalizeBridgeUrl).filter(Boolean)));
  select.innerHTML = urls.map(url => `<option value="${esc(url)}">${esc(url)}</option>`).join("");
  select.onchange = () => {
    document.getElementById("ws-url").value = select.value;
  };
}

function saveBridgeUrlToHistory(rawUrl) {
  const normalized = normalizeBridgeUrl(rawUrl);
  if (!normalized) return "";
  if (!isBridgeUrlCandidate(normalized)) return "";
  const history = [normalized, ...getBridgeHistory().filter(url => normalizeBridgeUrl(url) !== normalized)].slice(0, MAX_BRIDGE_URL_HISTORY);
  localStorage.setItem(BRIDGE_URL_STORAGE_KEY, normalized);
  localStorage.setItem(BRIDGE_URL_HISTORY_KEY, JSON.stringify(history));
  renderBridgeUrlCandidates();
  return normalized;
}

function initializeBridgeUrlUi() {
  const urlInput = document.getElementById("ws-url");
  const savedUrl = normalizeBridgeUrl(localStorage.getItem(BRIDGE_URL_STORAGE_KEY) || "");
  urlInput.value = isBridgeUrlCandidate(savedUrl) ? savedUrl : getDefaultBridgeCandidates()[0] || "";
  urlInput.addEventListener("keydown", event => {
    if (event.key === "Enter") {
      event.preventDefault();
      connect();
    }
  });
  renderBridgeUrlCandidates();
}

function loadWatchedClientVars() {
  try {
    const parsed = JSON.parse(localStorage.getItem(WATCHED_CLIENT_VARS_STORAGE_KEY) || "[]");
    watchedClientVars = Array.isArray(parsed)
      ? parsed.map(name => String(name).trim()).filter(Boolean)
      : [];
  } catch {
    watchedClientVars = [];
  }
  watchedClientVars = Array.from(new Set(watchedClientVars));
}

function saveWatchedClientVars() {
  localStorage.setItem(WATCHED_CLIENT_VARS_STORAGE_KEY, JSON.stringify(watchedClientVars));
}

function addWatchedClientVar() {
  const input = document.getElementById("watch-var-name");
  const name = input.value.trim();
  if (!name) {
    toast("Variable name required", true);
    return;
  }
  if (!watchedClientVars.includes(name)) {
    watchedClientVars.push(name);
    saveWatchedClientVars();
  }
  input.value = "";
  renderAll();
}

function watchClientVar(name) {
  const normalized = String(name || "").trim();
  if (!normalized) return;
  if (!watchedClientVars.includes(normalized)) {
    watchedClientVars.push(normalized);
    saveWatchedClientVars();
    toast(`Watching ${normalized}`);
  }
  renderAll();
}

function removeWatchedClientVar(name) {
  watchedClientVars = watchedClientVars.filter(item => item !== name);
  saveWatchedClientVars();
  renderAll();
}

function jsString(value) {
  return JSON.stringify(String(value));
}

function renderWatchedClientVars() {
  const el = document.getElementById("watch-var-list");
  if (!watchedClientVars.length) {
    el.innerHTML = "";
    return;
  }
  el.innerHTML = watchedClientVars
    .map(name => `<span class="watch-chip"><span class="mono">${esc(name)}</span><button type="button" class="remove-watch-btn" data-var-name="${esc(name)}" title="Remove" aria-label="Remove ${esc(name)}">x</button></span>`)
    .join("");
}

function connect() {
  const url = normalizeBridgeUrl(document.getElementById("ws-url").value);
  if (!url) {
    toast("Bridge URL required", true);
    return;
  }
  try {
    const parsed = new URL(url);
    if (parsed.protocol !== "ws:" && parsed.protocol !== "wss:") throw new Error("Invalid protocol");
  } catch {
    toast(`Invalid URL: ${url}`, true);
    return;
  }

  if (!isBridgeUrlCandidate(url)) {
    toast(
      "Bridge Server URLを指定してください。GitHub PagesではBridge Serverは起動していません。",
      true,
      8000,
      { label: "起動方法", href: BRIDGE_START_GUIDE_URL }
    );
    return;
  }

  document.getElementById("ws-url").value = saveBridgeUrlToHistory(url);
  if (ws && ws.readyState <= 1) ws.close();
  ws = new WebSocket(url);
  ws.onopen = () => {
    setStatus(true);
    requestSnapshot();
  };
  ws.onclose = () => setStatus(false);
  ws.onerror = () => toast(
    "Bridge Serverが見つかりません。先にBridge Serverを起動してからConnectしてください。",
    true,
    8000,
    { label: "起動方法", href: BRIDGE_START_GUIDE_URL }
  );
  ws.onmessage = event => handleMessage(JSON.parse(event.data));
}

function disconnect() {
  if (ws) ws.close();
}

function openViewer3d() {
  window.location.href = new URL("3d.html", window.location.href).toString();
}

function clearLiveState() {
  clients = {};
  idMappings = {};
  globalVars = {};
  clientVars = {};
  selectedClientNo = null;
  roomSummary = { roomClientCount: 0, poseClientCount: 0, stealthClientCount: 0, webClientCount: 0, maxRecommendedClients: 100 };
  preserveDetailRenderUntil = 0;
  preserveGlobalRenderUntil = 0;
  mapHitTargets = [];
  dummyCount = 0;
  canvasView = { centerX: 0, centerZ: 0, scale: 40 };
  mapCommandMarkers = [];
  dummies = [];
  selectedDummyIndex = null;
  spawnMode = false;
  spawnPreviewWorld = null;
  renderAll();
}

function requestSnapshot() {
  if (!ws || ws.readyState !== 1) {
    clearLiveState();
    toast("Display cleared");
    return;
  }
  preserveDetailRenderUntil = 0;
  preserveGlobalRenderUntil = 0;
  ws.send(JSON.stringify({ action: "get_snapshot" }));
  toast("Refresh requested");
}

function getListedClientNos() {
  return Array.from(new Set([
    ...Object.keys(idMappings),
    ...Object.keys(clients)
  ])).sort((a, b) => Number(a) - Number(b));
}

function pruneDisconnectedClientState() {
  const active = new Set(getListedClientNos().map(String));
  for (const cno of Object.keys(clientVars)) {
    if (!active.has(String(cno))) delete clientVars[cno];
  }
  if (selectedClientNo && !active.has(String(selectedClientNo))) {
    selectedClientNo = null;
  }
}

function getClientFilter() {
  return (document.getElementById("client-filter")?.value || "").trim().toLowerCase();
}

function matchesClientFilter(cno) {
  const filter = getClientFilter();
  if (!filter) return true;
  const mapping = idMappings[cno] || {};
  const vars = clientVars[cno] || {};
  return String(cno).includes(filter)
    || (mapping.deviceId || "").toLowerCase().includes(filter)
    || Object.keys(vars).some(name => name.toLowerCase().includes(filter))
    || Object.values(vars).some(variable => String(variable?.value || "").toLowerCase().includes(filter));
}

function shortDeviceId(deviceId) {
  if (!deviceId) return "-";
  return deviceId.length > 22 ? `${deviceId.slice(0, 10)}...${deviceId.slice(-6)}` : deviceId;
}

function getVarCount() {
  return Object.keys(globalVars).length + Object.values(clientVars).reduce((sum, vars) => sum + Object.keys(vars || {}).length, 0);
}

function getDerivedSummary() {
  const mappedRoomClients = Object.values(idMappings).filter(m => !m.stealth).length;
  const poseClientCount = Object.keys(clients).length;
  return {
    roomClientCount: Math.max(mappedRoomClients, roomSummary.roomClientCount || 0, poseClientCount),
    poseClientCount: Math.max(roomSummary.poseClientCount || 0, poseClientCount),
    webClientCount: roomSummary.webClientCount || 0,
    varCount: getVarCount()
  };
}

function renderOverview() {
  const summary = getDerivedSummary();
  document.getElementById("stat-room-clients").textContent = summary.roomClientCount;
  document.getElementById("stat-pose-clients").textContent = summary.poseClientCount;
  document.getElementById("stat-web-clients").textContent = summary.webClientCount;
  document.getElementById("stat-var-count").textContent = summary.varCount;
  document.getElementById("map-caption").textContent = `pose ${summary.poseClientCount} / dummy ${dummyCount}`;
  document.getElementById("dummy-count").textContent = String(dummyCount);
  updateDummySelectionUi();
}

function getDummyClientNo(dummyIndex) {
  const dummy = dummies[dummyIndex];
  if (!dummy) return null;
  for (const [cno, mapping] of Object.entries(idMappings)) {
    if (mapping.deviceId === dummy.deviceId) return Number(cno);
  }
  return null;
}

function getDummyIndexByClientNo(clientNo) {
  const mapping = idMappings[String(clientNo)];
  if (!mapping?.deviceId) return null;
  const index = dummies.findIndex(dummy => dummy.deviceId === mapping.deviceId);
  return index >= 0 ? index : null;
}

function getDummyWorldPos(dummyIndex) {
  const clientNo = getDummyClientNo(dummyIndex);
  const pose = clientNo != null ? clients[String(clientNo)] : null;
  if (pose?.head?.pos) {
    return { x: pose.head.pos.x, z: pose.head.pos.z };
  }
  const dummy = dummies[dummyIndex];
  if (!dummy) return null;
  return { x: dummy.x, z: dummy.z };
}

function findDummyAtWorldPos(wx, wz, threshold = 0.5) {
  for (let i = dummies.length - 1; i >= 0; i -= 1) {
    const pos = getDummyWorldPos(i);
    if (!pos) continue;
    if (Math.hypot(pos.x - wx, pos.z - wz) < threshold) return i;
  }
  return null;
}

function setSelectedDummy(index) {
  selectedDummyIndex = selectedDummyIndex === index ? null : index;
  updateDummySelectionUi();
  scheduleMapRedraw();
}

function deselectDummy() {
  if (selectedDummyIndex == null) return;
  selectedDummyIndex = null;
  updateDummySelectionUi();
  scheduleMapRedraw();
}

function updateDummySelectionUi() {
  const label = document.getElementById("dummy-selection-label");
  const removeButton = document.getElementById("dummy-remove-btn");
  const deselectButton = document.getElementById("dummy-deselect-btn");
  const selectedText = selectedDummyIndex == null || !dummies[selectedDummyIndex]
    ? "(none)"
    : `Dummy #${selectedDummyIndex}`;
  if (label) label.innerHTML = `Selected: <strong>${esc(selectedText)}</strong>`;
  if (removeButton) removeButton.disabled = selectedDummyIndex == null;
  if (deselectButton) deselectButton.disabled = selectedDummyIndex == null;
  updateSpawnButtonUi();
}

function updateSpawnButtonUi() {
  const button = document.getElementById("spawn-btn");
  if (button) button.textContent = spawnMode ? "Click map to place..." : "Spawn";
}

function rowForClient(cno) {
  const mapping = idMappings[cno] || {};
  const pose = clients[cno] || {};
  const vars = clientVars[cno] || {};
  const head = pose.head?.pos;
  return {
    cno,
    deviceId: mapping.deviceId || "",
    type: mapping.stealth ? "stealth" : "standard",
    hasPose: !!pose.head,
    variableCount: Object.keys(vars).length,
    position: head ? `${head.x.toFixed(2)}, ${head.y.toFixed(2)}, ${head.z.toFixed(2)}` : "-",
    watchedValues: Object.fromEntries(watchedClientVars.map(name => [name, vars[name]?.value ?? "-"]))
  };
}

function renderParticipants() {
  const el = document.getElementById("participants-grid");
  pruneDisconnectedClientState();
  const rows = getListedClientNos().filter(matchesClientFilter).map(rowForClient);
  if (rows.length === 0) {
    el.innerHTML = `<div class="empty">${getClientFilter() ? "No match" : "No participants"}</div>`;
    return;
  }

  const watchedHeaders = watchedClientVars.map(name => `<th>${esc(name)}</th>`).join("");
  let html = `<table><thead><tr><th>Client</th><th>Device ID</th><th>Type</th><th>Pose</th><th>Vars</th>${watchedHeaders}<th class="col-position">Position</th></tr></thead><tbody>`;
  for (const row of rows) {
    const selected = String(selectedClientNo) === String(row.cno) ? " selected" : "";
    const watchedCells = watchedClientVars
      .map(name => `<td class="mono watched-value" title="${esc(row.watchedValues[name])}">${esc(row.watchedValues[name])}</td>`)
      .join("");
    html += `<tr class="participant-row${selected}" data-client-no="${esc(row.cno)}">
      <td class="mono">#${esc(row.cno)}</td>
      <td class="mono device" title="${esc(row.deviceId)}">${esc(shortDeviceId(row.deviceId))}</td>
      <td><span class="pill ${row.type === "stealth" ? "stealth" : ""}">${esc(row.type)}</span></td>
      <td><span class="pill ${row.hasPose ? "active" : ""}">${row.hasPose ? "active" : "-"}</span></td>
      <td class="mono">${row.variableCount}</td>
      ${watchedCells}
      <td class="mono col-position">${esc(row.position)}</td>
    </tr>`;
  }
  html += "</tbody></table>";
  el.innerHTML = html;
}

function renderGlobalVars() {
  if (shouldPreserveGlobalRender()) return;
  const el = document.getElementById("global-vars-display");
  const keys = Object.keys(globalVars).sort();
  if (keys.length === 0) {
    el.innerHTML = `<div class="empty">No variables</div>`;
    return;
  }
  let html = "<table><thead><tr><th>Name</th><th>Value</th><th>Writer</th></tr></thead><tbody>";
  keys.forEach((name, index) => {
    const v = globalVars[name];
    const inputId = `global-var-value-${index}`;
    html += `<tr>
      <td class="mono">${esc(name)}</td>
      <td>
        <div class="inline-edit">
          <input id="${inputId}" type="text" value="${esc(v.value)}">
          <button type="button" class="global-var-set-btn" data-var-name="${esc(name)}" data-input-id="${esc(inputId)}">Set</button>
          <button type="button" class="global-var-clear-btn" data-var-name="${esc(name)}">Clear</button>
        </div>
      </td>
      <td class="mono">#${esc(v.lastWriter)}</td>
    </tr>`;
  });
  html += "</tbody></table>";
  el.innerHTML = html;
}

function scrollSelectedParticipantIntoView() {
  if (!selectedClientNo) return;
  const grid = document.getElementById("participants-grid");
  const row = Array.from(grid?.querySelectorAll(".participant-row") || [])
    .find(item => String(item.dataset.clientNo) === String(selectedClientNo));
  if (!row) return;
  const gridRect = grid.getBoundingClientRect();
  const rowRect = row.getBoundingClientRect();
  if (rowRect.top < gridRect.top || rowRect.bottom > gridRect.bottom) {
    row.scrollIntoView({ block: "center", inline: "nearest" });
  }
}

function selectClient(cno, options = {}) {
  selectedClientNo = cno;
  renderAll();
  if (options.scrollIntoList) {
    requestAnimationFrame(scrollSelectedParticipantIntoView);
  }
}

function initializeParticipantGridUi() {
  const grid = document.getElementById("participants-grid");
  grid.addEventListener("pointerdown", event => {
    let row = event.target.closest(".participant-row");
    if (!row || !grid.contains(row)) {
      row = getParticipantRowAtPoint(event.clientX, event.clientY);
    }
    if (!row) return;
    event.preventDefault();
    selectClient(row.dataset.clientNo);
  });
}

function getDummySpawnConfig() {
  return {
    count: Number(document.getElementById("dummy-spawn-count")?.value || 0),
    centerX: Number(document.getElementById("dummy-center-x")?.value || 0),
    centerZ: Number(document.getElementById("dummy-center-z")?.value || 0),
    radius: Number(document.getElementById("dummy-radius")?.value || 0)
  };
}

function spawnDummies(countOverride = null) {
  if (!isConnected()) {
    toast("Not connected", true);
    return;
  }
  const config = getDummySpawnConfig();
  const count = countOverride == null ? config.count : Number(countOverride);
  if (!(count > 0)) {
    toast("Dummy count required", true);
    return;
  }
  if (countOverride == null) {
    spawnMode = !spawnMode;
    spawnPreviewWorld = null;
    updateSpawnButtonUi();
    scheduleMapRedraw();
    toast(spawnMode ? "Click map to place dummies" : "Spawn canceled");
    return;
  }
  ws.send(JSON.stringify({
    action: "spawn_dummies",
    count,
    centerX: config.centerX,
    centerZ: config.centerZ,
    radius: config.radius
  }));
  toast(`Spawn requested: ${count}`);
}

function despawnDummies() {
  if (!isConnected()) {
    toast("Not connected", true);
    return;
  }
  ws.send(JSON.stringify({ action: "despawn_dummies" }));
  deselectDummy();
  toast("Despawn requested");
}

function removeSelectedDummy() {
  if (!isConnected()) {
    toast("Not connected", true);
    return;
  }
  if (selectedDummyIndex == null) {
    toast("No dummy selected", true);
    return;
  }
  ws.send(JSON.stringify({ action: "despawn_one", index: selectedDummyIndex }));
  selectedDummyIndex = null;
  updateDummySelectionUi();
  scheduleMapRedraw();
  toast("Dummy remove requested");
}

function chooseNiceStep(value) {
  const safeValue = Math.max(value, 1e-6);
  const exponent = Math.floor(Math.log10(safeValue));
  const magnitude = 10 ** exponent;
  const normalized = safeValue / magnitude;
  const bucket = normalized <= 1 ? 1 : normalized <= 2 ? 2 : normalized <= 5 ? 5 : 10;
  return bucket * magnitude;
}

function worldToCanvas(wx, wz, width, height) {
  return {
    x: width / 2 + (wx - canvasView.centerX) * canvasView.scale,
    y: height / 2 - (wz - canvasView.centerZ) * canvasView.scale
  };
}

function canvasToWorld(px, py, width, height) {
  return {
    x: canvasView.centerX + ((px - width / 2) / canvasView.scale),
    z: canvasView.centerZ - ((py - height / 2) / canvasView.scale)
  };
}

function addMapCommandMarker(x, z) {
  mapCommandMarkers.push({ x, z, createdAt: performance.now() });
  mapCommandMarkers = mapCommandMarkers.slice(-10);
  scheduleMapRedraw();
}

function scheduleMapRedraw() {
  if (mapRedrawFrame) return;
  mapRedrawFrame = requestAnimationFrame(() => {
    mapRedrawFrame = 0;
    drawAvatars();
  });
}

function findMapHitTarget(x, y) {
  return mapHitTargets
    .map(target => ({
      ...target,
      distance: Math.hypot(target.x - x, target.y - y)
    }))
    .filter(target => target.distance <= target.radius)
    .sort((a, b) => a.distance - b.distance)[0] || null;
}

function initializeMapUi() {
  const canvas = document.getElementById("avatar-canvas");
  canvas.addEventListener("mousemove", event => {
    if (!spawnMode) return;
    const rect = canvas.getBoundingClientRect();
    const x = (event.clientX - rect.left) * (canvas.width / rect.width);
    const y = (event.clientY - rect.top) * (canvas.height / rect.height);
    spawnPreviewWorld = canvasToWorld(x, y, canvas.width, canvas.height);
    scheduleMapRedraw();
  });
  canvas.addEventListener("pointerdown", event => {
    const rect = canvas.getBoundingClientRect();
    const x = (event.clientX - rect.left) * (canvas.width / rect.width);
    const y = (event.clientY - rect.top) * (canvas.height / rect.height);
    const hit = findMapHitTarget(x, y);
    if (hit) {
      event.preventDefault();
      const dummyIndex = getDummyIndexByClientNo(hit.cno);
      if (dummyIndex != null) {
        setSelectedDummy(dummyIndex);
      } else {
        selectClient(hit.cno, { scrollIntoList: true });
      }
      return;
    }
    if (!isConnected()) return;

    const world = canvasToWorld(x, y, canvas.width, canvas.height);
    if (spawnMode) {
      const count = Number(document.getElementById("dummy-spawn-count")?.value || 0);
      if (!(count > 0)) {
        toast("Dummy count required", true);
        return;
      }
      ws.send(JSON.stringify({
        action: "spawn_dummies",
        count,
        centerX: world.x,
        centerZ: world.z,
        radius: 1.5,
      }));
      spawnMode = false;
      spawnPreviewWorld = null;
      updateSpawnButtonUi();
      addMapCommandMarker(world.x, world.z);
      toast(`Spawn requested: ${count}`);
      event.preventDefault();
      return;
    }
    if (!dummyCount) return;
    const dummyIndex = findDummyAtWorldPos(world.x, world.z);
    if (dummyIndex != null) {
      setSelectedDummy(dummyIndex);
      event.preventDefault();
      return;
    }
    const action = event.shiftKey
      ? (selectedDummyIndex != null ? "add_waypoint_one" : "add_waypoint")
      : (selectedDummyIndex != null ? "move_one_to" : "move_dummies_to");
    const payload = { action, x: world.x, z: world.z };
    if (selectedDummyIndex != null) payload.index = selectedDummyIndex;
    ws.send(JSON.stringify(payload));
    addMapCommandMarker(world.x, world.z);
    event.preventDefault();
  });
  canvas.addEventListener("dblclick", event => {
    if (!isConnected()) return;
    const rect = canvas.getBoundingClientRect();
    const x = (event.clientX - rect.left) * (canvas.width / rect.width);
    const y = (event.clientY - rect.top) * (canvas.height / rect.height);
    const world = canvasToWorld(x, y, canvas.width, canvas.height);
    const dummyIndex = findDummyAtWorldPos(world.x, world.z);
    if (dummyIndex == null) return;
    ws.send(JSON.stringify({ action: "despawn_one", index: dummyIndex }));
    if (selectedDummyIndex === dummyIndex) selectedDummyIndex = null;
    updateDummySelectionUi();
    scheduleMapRedraw();
    event.preventDefault();
  });
}

function initializeEditGuards() {
  const detail = document.getElementById("detail-body");
  detail.addEventListener("pointerdown", event => {
    if (event.target.closest("input, button")) {
      preserveDetailRenderUntil = Date.now() + 1500;
    }
  });
  detail.addEventListener("input", () => {
    preserveDetailRenderUntil = Date.now() + 1500;
  });

  const global = document.querySelector(".side-global");
  global.addEventListener("pointerdown", event => {
    if (event.target.closest("input, button")) {
      preserveGlobalRenderUntil = Date.now() + 1500;
    }
  });
  global.addEventListener("input", () => {
    preserveGlobalRenderUntil = Date.now() + 1500;
  });
}

function handleVariableAction(event) {
  const refreshButton = event.target.closest(".refresh-btn");
  if (refreshButton) {
    event.preventDefault();
    event.stopPropagation();
    requestSnapshot();
    return true;
  }

  const removeButton = event.target.closest(".remove-watch-btn");
  if (removeButton) {
    event.preventDefault();
    event.stopPropagation();
    removeWatchedClientVar(removeButton.dataset.varName);
    return true;
  }

  const watchButton = event.target.closest(".watch-var-btn");
  if (watchButton) {
    event.preventDefault();
    event.stopPropagation();
    watchClientVar(watchButton.dataset.varName);
    return true;
  }

  const clientSetButton = event.target.closest(".client-var-set-btn");
  if (clientSetButton) {
    event.preventDefault();
    event.stopPropagation();
    const input = document.getElementById(clientSetButton.dataset.inputId);
    setClientVarValue(
      Number(clientSetButton.dataset.clientNo),
      clientSetButton.dataset.varName,
      input?.value || ""
    );
    return true;
  }

  const clientClearButton = event.target.closest(".client-var-clear-btn");
  if (clientClearButton) {
    event.preventDefault();
    event.stopPropagation();
    clearClientVarValue(Number(clientClearButton.dataset.clientNo), clientClearButton.dataset.varName);
    return true;
  }

  const globalSetButton = event.target.closest(".global-var-set-btn");
  if (globalSetButton) {
    event.preventDefault();
    event.stopPropagation();
    const input = document.getElementById(globalSetButton.dataset.inputId);
    setGlobalVarValue(globalSetButton.dataset.varName, input?.value || "");
    return true;
  }

  const globalClearButton = event.target.closest(".global-var-clear-btn");
  if (globalClearButton) {
    event.preventDefault();
    event.stopPropagation();
    clearGlobalVarValue(globalClearButton.dataset.varName);
    return true;
  }

  return false;
}

function initializeVariableActions() {
  document.addEventListener("pointerdown", event => {
    handleVariableAction(event);
  });
  document.addEventListener("click", event => {
    if (event.detail === 0) handleVariableAction(event);
  });
}

function shouldPreserveDetailRender() {
  const active = document.activeElement;
  return Date.now() < preserveDetailRenderUntil
    || !!active?.closest?.("#detail-body input, #detail-body textarea, #detail-body select");
}

function shouldPreserveGlobalRender() {
  const active = document.activeElement;
  return Date.now() < preserveGlobalRenderUntil
    || !!active?.closest?.("#global-vars-display input, #global-vars-display textarea, #global-vars-display select");
}

function getParticipantRowAtPoint(x, y) {
  for (const row of document.querySelectorAll("#participants-grid .participant-row")) {
    const rect = row.getBoundingClientRect();
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      return row;
    }
  }
  return null;
}

function clearSelection() {
  selectedClientNo = null;
  renderAll();
}

function renderDetail() {
  if (shouldPreserveDetailRender()) return;
  const title = document.getElementById("detail-title");
  const el = document.getElementById("detail-body");
  pruneDisconnectedClientState();
  if (!selectedClientNo || !getListedClientNos().includes(String(selectedClientNo))) {
    title.textContent = "Client Details";
    el.innerHTML = `<div class="detail-empty">Select a participant.</div>`;
    return;
  }

  const cno = String(selectedClientNo);
  const mapping = idMappings[cno] || {};
  const pose = clients[cno] || {};
  const vars = clientVars[cno] || {};
  const head = pose.head?.pos;
  title.textContent = `Client #${cno}`;

  let html = "";
  html += detailKv("Client No", `#${cno}`);
  html += detailKv("Device ID", mapping.deviceId || "-");
  html += detailKv("Type", mapping.stealth ? "stealth" : "standard");
  html += detailKv("Pose", pose.head ? "active" : "-");
  html += detailKv("Head", head ? `x ${head.x.toFixed(3)}, y ${head.y.toFixed(3)}, z ${head.z.toFixed(3)}` : "-");
  html += `<div class="vars"><h3>Client Variables</h3>`;

  const names = Object.keys(vars).sort();
  if (names.length === 0) {
    html += `<div class="empty">No variables</div>`;
  } else {
    html += "<table><thead><tr><th>Name</th><th>Value</th><th>Writer</th><th></th></tr></thead><tbody>";
    names.forEach((name, index) => {
      const v = vars[name];
      const watched = watchedClientVars.includes(name);
      const inputId = `client-${cno}-var-value-${index}`;
      html += `<tr>
        <td class="mono"><button type="button" class="watch-var-btn" data-var-name="${esc(name)}">${esc(name)}</button></td>
        <td>
          <div class="inline-edit">
            <input id="${inputId}" type="text" value="${esc(v.value)}">
            <button type="button" class="client-var-set-btn" data-client-no="${esc(cno)}" data-var-name="${esc(name)}" data-input-id="${esc(inputId)}">Set</button>
            <button type="button" class="client-var-clear-btn" data-client-no="${esc(cno)}" data-var-name="${esc(name)}">Clear</button>
          </div>
        </td>
        <td class="mono">#${esc(v.lastWriter)}</td>
        <td><div class="table-actions"><button type="button" class="watch-var-btn" data-var-name="${esc(name)}">${watched ? "Watching" : "Watch"}</button></div></td>
      </tr>`;
    });
    html += "</tbody></table>";
  }

  html += `</div>
    <div class="editor">
      <div class="editor-row">
        <input type="text" id="set-cv-name" placeholder="name">
        <input type="text" id="set-cv-value" placeholder="value">
        <button onclick="setClientVar(${Number(cno)})">Set</button>
      </div>
      <div class="editor-row">
        <input type="text" id="rpc-func" placeholder="function">
        <input type="text" id="rpc-args" placeholder="args">
        <button onclick="sendRpc(${Number(cno)})">RPC</button>
      </div>
    </div>`;
  el.innerHTML = html;
}

function detailKv(key, value) {
  return `<div class="kv"><div class="k">${esc(key)}</div><div class="v mono">${esc(value)}</div></div>`;
}

function renderAll() {
  pruneDisconnectedClientState();
  renderOverview();
  renderWatchedClientVars();
  renderParticipants();
  renderGlobalVars();
  renderDetail();
  drawAvatars();
}

function handleMessage(msg) {
  switch (msg.type) {
    case "room_pose": {
      const alive = new Set();
      for (const c of msg.clients || []) {
        alive.add(Number(c.clientNo));
        clients[c.clientNo] = c;
      }
      for (const cno of Object.keys(clients)) {
        if (!alive.has(Number(cno))) delete clients[cno];
      }
      roomSummary.poseClientCount = (msg.clients || []).length;
      roomSummary.roomClientCount = Object.keys(idMappings).length > 0
        ? Object.values(idMappings).filter(m => !m.stealth).length
        : (msg.clients || []).length;
      renderAll();
      break;
    }
    case "bridge_status":
      roomSummary = { ...roomSummary, ...(msg.roomSummary || {}) };
      dummyCount = Number(msg.dummyCount || 0);
      renderAll();
      break;
    case "id_mapping":
      idMappings = {};
      for (const m of msg.mappings || []) idMappings[m.clientNo] = m;
      roomSummary.roomClientCount = (msg.mappings || []).filter(m => !m.stealth).length;
      pruneDisconnectedClientState();
      renderAll();
      break;
    case "global_var_sync":
      for (const v of msg.variables || []) {
        globalVars[v.name] = { value: v.value, timestamp: v.timestamp, lastWriter: v.lastWriter };
      }
      renderAll();
      break;
    case "client_var_sync":
      for (const [cno, vars] of Object.entries(msg.clientVariables || {})) {
        if (!clientVars[cno]) clientVars[cno] = {};
        for (const v of vars) {
          clientVars[cno][v.name] = { value: v.value, timestamp: v.timestamp, lastWriter: v.lastWriter };
        }
      }
      renderAll();
      break;
    case "nv_snapshot":
      globalVars = msg.globalVariables || {};
      clientVars = msg.clientVariables || {};
      idMappings = {};
      for (const m of msg.idMappings || []) idMappings[m.clientNo] = m;
      roomSummary = { ...roomSummary, ...(msg.roomSummary || {}) };
      dummyCount = Number(msg.dummyCount || 0);
      dummies = msg.dummies || [];
      if (selectedDummyIndex !== null && selectedDummyIndex >= dummies.length) {
        selectedDummyIndex = null;
      }
      pruneDisconnectedClientState();
      renderAll();
      break;
    case "dummy_status":
      dummyCount = Number(msg.count || 0);
      renderAll();
      break;
    case "dummy_list":
      dummies = msg.dummies || [];
      dummyCount = Number(msg.count || dummies.length || 0);
      if (selectedDummyIndex !== null && selectedDummyIndex >= dummies.length) {
        selectedDummyIndex = null;
      }
      renderAll();
      break;
    case "rpc":
      toast(`RPC #${msg.senderClientNo}: ${msg.functionName}`);
      break;
  }
}

function sendRpc(targetClientNo) {
  if (!ws || ws.readyState !== 1) {
    toast("Not connected", true);
    return;
  }
  const func = document.getElementById("rpc-func")?.value.trim();
  const rawArgs = document.getElementById("rpc-args")?.value || "";
  if (!func) {
    toast("Function required", true);
    return;
  }
  const args = rawArgs ? rawArgs.split(",").map(s => s.trim()) : [];
  const msg = { action: "rpc", functionName: func, args };
  if (targetClientNo) msg.targetClientNos = [targetClientNo];
  ws.send(JSON.stringify(msg));
  toast("RPC sent");
}

function collectMapBoundsPoints() {
  const points = [];
  for (const pose of Object.values(clients)) {
    const head = pose?.head?.pos;
    if (!head) continue;
    points.push({ x: head.x, z: head.z });
    if (pose.right?.relPos) {
      points.push({ x: head.x + pose.right.relPos.x, z: head.z + pose.right.relPos.z });
    }
    if (pose.left?.relPos) {
      points.push({ x: head.x + pose.left.relPos.x, z: head.z + pose.left.relPos.z });
    }
  }
  for (const dummy of dummies) {
    points.push({ x: dummy.x, z: dummy.z });
  }
  if (spawnMode && spawnPreviewWorld) {
    points.push({ x: spawnPreviewWorld.x - 1.5, z: spawnPreviewWorld.z - 1.5 });
    points.push({ x: spawnPreviewWorld.x + 1.5, z: spawnPreviewWorld.z + 1.5 });
  }
  return points;
}

function drawSpawnPreview(ctx, width, height) {
  if (!spawnMode || !spawnPreviewWorld) return;
  const point = worldToCanvas(spawnPreviewWorld.x, spawnPreviewWorld.z, width, height);
  const radiusPx = 1.5 * canvasView.scale;
  ctx.fillStyle = "rgba(143, 183, 255, 0.12)";
  ctx.strokeStyle = "rgba(143, 183, 255, 0.45)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(point.x, point.y, radiusPx, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function drawGrid(ctx, width, height, pixelStep = null) {
  ctx.strokeStyle = "#1d2635";
  ctx.lineWidth = 1;
  if (pixelStep != null) {
    for (let x = 0; x <= width; x += pixelStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, height);
      ctx.stroke();
    }
    for (let y = 0; y <= height; y += pixelStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(width, y);
      ctx.stroke();
    }
    return;
  }

  const stepWorld = chooseNiceStep(40 / canvasView.scale);
  const worldHalfWidth = width / (2 * canvasView.scale);
  const worldHalfHeight = height / (2 * canvasView.scale);
  const minWorldX = canvasView.centerX - worldHalfWidth;
  const maxWorldX = canvasView.centerX + worldHalfWidth;
  const minWorldZ = canvasView.centerZ - worldHalfHeight;
  const maxWorldZ = canvasView.centerZ + worldHalfHeight;

  for (let wx = Math.floor(minWorldX / stepWorld) * stepWorld; wx <= maxWorldX; wx += stepWorld) {
    const point = worldToCanvas(wx, canvasView.centerZ, width, height);
    ctx.beginPath();
    ctx.moveTo(point.x, 0);
    ctx.lineTo(point.x, height);
    ctx.stroke();
  }
  for (let wz = Math.floor(minWorldZ / stepWorld) * stepWorld; wz <= maxWorldZ; wz += stepWorld) {
    const point = worldToCanvas(canvasView.centerX, wz, width, height);
    ctx.beginPath();
    ctx.moveTo(0, point.y);
    ctx.lineTo(width, point.y);
    ctx.stroke();
  }
}

function drawOriginMarker(ctx, width, height) {
  const origin = worldToCanvas(0, 0, width, height);
  ctx.strokeStyle = "rgba(255,255,255,.65)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(origin.x - 8, origin.y);
  ctx.lineTo(origin.x + 8, origin.y);
  ctx.moveTo(origin.x, origin.y - 8);
  ctx.lineTo(origin.x, origin.y + 8);
  ctx.stroke();
}

function drawScaleBar(ctx, width, height) {
  const distance = chooseNiceStep(110 / canvasView.scale);
  const px = distance * canvasView.scale;
  const x = 18;
  const y = height - 18;
  ctx.strokeStyle = "#dbe4ee";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + px, y);
  ctx.moveTo(x, y - 6);
  ctx.lineTo(x, y + 6);
  ctx.moveTo(x + px, y - 6);
  ctx.lineTo(x + px, y + 6);
  ctx.stroke();
  ctx.fillStyle = "#dbe4ee";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(`${distance.toFixed(distance >= 10 ? 0 : 1)} m`, x, y - 9);
}

function drawMapCommandFeedback(ctx, width, height) {
  const now = performance.now();
  mapCommandMarkers = mapCommandMarkers.filter(marker => now - marker.createdAt < 5000);
  if (!mapCommandMarkers.length) return;

  for (const marker of mapCommandMarkers) {
    const elapsed = now - marker.createdAt;
    const progress = elapsed / 5000;
    const alpha = 1 - progress;
    const point = worldToCanvas(marker.x, marker.z, width, height);
    const ringRadius = 10 + progress * 32;

    ctx.strokeStyle = `rgba(255, 86, 86, ${0.75 * alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(point.x, point.y, ringRadius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = `rgba(255, 86, 86, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(point.x - 7, point.y);
    ctx.lineTo(point.x + 7, point.y);
    ctx.moveTo(point.x, point.y - 7);
    ctx.lineTo(point.x, point.y + 7);
    ctx.stroke();
  }

  scheduleMapRedraw();
}

function drawAvatars() {
  const canvas = document.getElementById("avatar-canvas");
  const ctx = canvas.getContext("2d");
  const width = canvas.width;
  const height = canvas.height;
  const poseEntries = Object.entries(clients).filter(([, data]) => data?.head?.pos);
  const boundsPoints = collectMapBoundsPoints();
  mapHitTargets = [];

  ctx.fillStyle = "#0c1017";
  ctx.fillRect(0, 0, width, height);

  if (!boundsPoints.length) {
    canvasView = { centerX: 0, centerZ: 0, scale: 40 };
    drawGrid(ctx, width, height, 40);
    drawOriginMarker(ctx, width, height);
    drawMapCommandFeedback(ctx, width, height);
    ctx.fillStyle = "#687386";
    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("No clients", width / 2, height / 2);
    return;
  }

  let minX = Infinity;
  let maxX = -Infinity;
  let minZ = Infinity;
  let maxZ = -Infinity;
  for (const point of boundsPoints) {
    minX = Math.min(minX, point.x);
    maxX = Math.max(maxX, point.x);
    minZ = Math.min(minZ, point.z);
    maxZ = Math.max(maxZ, point.z);
  }

  const rangeX = Math.max(maxX - minX, 2);
  const rangeZ = Math.max(maxZ - minZ, 2);
  canvasView = {
    centerX: (minX + maxX) / 2,
    centerZ: (minZ + maxZ) / 2,
    scale: Math.max(1, Math.min((width * 0.8) / rangeX, (height * 0.8) / rangeZ))
  };

  drawGrid(ctx, width, height);
  drawOriginMarker(ctx, width, height);
  drawScaleBar(ctx, width, height);

  const drawEntries = [...poseEntries].sort(([a], [b]) => {
    const selectedDummyClientNo = selectedDummyIndex != null ? getDummyClientNo(selectedDummyIndex) : null;
    if (String(a) === String(selectedClientNo) || Number(a) === selectedDummyClientNo) return 1;
    if (String(b) === String(selectedClientNo) || Number(b) === selectedDummyClientNo) return -1;
    return Number(a) - Number(b);
  });

  for (const [cno, pose] of drawEntries) {
    const selectedDummyClientNo = selectedDummyIndex != null ? getDummyClientNo(selectedDummyIndex) : null;
    const selected = String(cno) === String(selectedClientNo);
    const selectedDummy = Number(cno) === selectedDummyClientNo;
    const headPoint = worldToCanvas(pose.head.pos.x, pose.head.pos.z, width, height);
    const color = `hsl(${(Number(cno) * 47) % 360} 80% 62%)`;
    mapHitTargets.push({ cno, x: headPoint.x, y: headPoint.y, radius: selected || selectedDummy ? 24 : 18 });

    for (const handKey of ["right", "left"]) {
      const hand = pose[handKey]?.relPos;
      if (!hand) continue;
      const handPoint = worldToCanvas(
        pose.head.pos.x + hand.x,
        pose.head.pos.z + hand.z,
        width,
        height
      );
      ctx.strokeStyle = "rgba(232, 237, 242, 0.25)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(headPoint.x, headPoint.y);
      ctx.lineTo(handPoint.x, handPoint.y);
      ctx.stroke();
      ctx.fillStyle = "rgba(232, 237, 242, 0.55)";
      ctx.beginPath();
      ctx.arc(handPoint.x, handPoint.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    if (selected) {
      ctx.strokeStyle = "#f4c542";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(headPoint.x, headPoint.y, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(244, 197, 66, .35)";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(headPoint.x, headPoint.y, 23, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (selectedDummy) {
      ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(headPoint.x, headPoint.y, 20, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(headPoint.x, headPoint.y, 28, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(headPoint.x, headPoint.y, selected || selectedDummy ? 8 : 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = selectedDummy ? "#ffffff" : selected ? "#fff3bd" : "#0c1017";
    ctx.lineWidth = selected || selectedDummy ? 2 : 1;
    ctx.stroke();
    ctx.fillStyle = "#e8edf2";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`#${cno}`, headPoint.x + 9, headPoint.y + 4);
  }

  drawSpawnPreview(ctx, width, height);
  drawMapCommandFeedback(ctx, width, height);
}

renderAll();
initializeBridgeUrlUi();
loadWatchedClientVars();
initializeParticipantGridUi();
initializeMapUi();
