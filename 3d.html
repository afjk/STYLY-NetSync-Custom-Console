<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STYLY NetSync 3D Viewer</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #090b10; color: #e8edf2; font-family: "Segoe UI", system-ui, sans-serif; }
  button, input { font: inherit; }
  button {
    border: 1px solid #39414f;
    background: #1b2230;
    color: #e8edf2;
    border-radius: 6px;
    padding: 7px 12px;
    cursor: pointer;
  }
  button:hover { background: #253047; }
  button.active { background: #2367d1; border-color: #2b74df; }
  input {
    border: 1px solid #303846;
    background: #101621;
    color: #e8edf2;
    border-radius: 6px;
    padding: 7px 9px;
    min-width: 0;
  }
  #app { position: relative; width: 100%; height: 100%; }
  #scene { width: 100%; height: 100%; display: block; }
  .panel {
    position: absolute;
    top: 16px;
    left: 16px;
    width: min(380px, calc(100vw - 32px));
    display: grid;
    gap: 10px;
    padding: 14px;
    background: rgba(17, 21, 29, 0.9);
    border: 1px solid #2b3442;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  }
  .row, .button-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .row input { flex: 1 1 120px; }
  .button-row button { flex: 1 1 auto; }
  .label {
    min-width: 74px;
    color: #9aa7ba;
    font-size: 12px;
  }
  .status {
    color: #9aa7ba;
    font-size: 12px;
  }
  .selection {
    color: #d7deea;
    font-size: 12px;
  }
  .log {
    max-height: 220px;
    overflow: auto;
    border: 1px solid #202631;
    border-radius: 8px;
    background: #0d1118;
    padding: 8px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 12px;
    line-height: 1.45;
  }
  .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .log-entry:last-child { border-bottom: 0; }
  @media (max-width: 680px) {
    .panel { width: calc(100vw - 24px); top: 12px; left: 12px; right: 12px; }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>
  <div class="panel">
    <div class="row">
      <span class="label">WebSocket</span>
      <input id="ws-url" type="text" value="">
      <button id="connect-btn">Connect</button>
      <button id="open-console-btn" type="button">2D Console</button>
    </div>
    <div class="status" id="status-text">Disconnected</div>
    <div class="row">
      <span class="label">Dummy</span>
      <input id="dummy-count" type="number" value="20" min="1" placeholder="Count">
      <input id="dummy-radius" type="number" value="5" min="0" step="0.1" placeholder="Radius">
    </div>
    <div class="button-row">
      <button id="spawn-btn">Spawn</button>
      <button id="spawn-50-btn">+50</button>
      <button id="clear-btn">Clear</button>
    </div>
    <div class="button-row">
      <div class="selection" id="selection-text" style="flex:1 1 auto;">Selected: (none)</div>
      <button id="remove-btn" disabled>Remove</button>
      <button id="deselect-btn" disabled>Deselect</button>
    </div>
    <div class="button-row">
      <button data-mode="virtual" class="mode-btn active">Virtual</button>
      <button data-mode="virtualPhysical" class="mode-btn">V+Physical</button>
      <button data-mode="physical" class="mode-btn">Physical</button>
    </div>
    <div class="log" id="event-log"></div>
  </div>
</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const canvas = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f16);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 12, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.maxPolarAngle = THREE.MathUtils.degToRad(86);
controls.minDistance = 3;
controls.maxDistance = 60;
controls.target.set(0, 1.2, 0);

scene.add(new THREE.AmbientLight(0x8f98ab, 1.05));

const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(8, 15, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -25;
sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25;
sun.shadow.camera.bottom = -25;
scene.add(sun);

const gridHelper = new THREE.GridHelper(50, 50, 0x4c5f80, 0x273244);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

function createAxisLine(points, color) {
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  return new THREE.Line(
    geometry,
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.95 })
  );
}

const axisGroup = new THREE.Group();
axisGroup.add(createAxisLine(
  [new THREE.Vector3(-25, 0.02, 0), new THREE.Vector3(25, 0.02, 0)],
  0xff6b6b
));
axisGroup.add(createAxisLine(
  [new THREE.Vector3(0, 0.02, -25), new THREE.Vector3(0, 0.02, 25)],
  0x61b3ff
));

const originMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 20, 16),
  new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x9aa3ad, emissiveIntensity: 0.45 })
);
originMarker.position.set(0, 0.12, 0);
axisGroup.add(originMarker);

const originRing = new THREE.Mesh(
  new THREE.RingGeometry(0.22, 0.32, 40),
  new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.65, side: THREE.DoubleSide })
);
originRing.rotation.x = -Math.PI / 2;
originRing.position.y = 0.01;
axisGroup.add(originRing);

scene.add(axisGroup);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.ShadowMaterial({ color: 0x000000, opacity: 0.22 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const handleGroup = new THREE.Group();
const handleMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.4, 32, 24),
  new THREE.MeshStandardMaterial({ color: 0xff9b2f, emissive: 0x9f4f00, emissiveIntensity: 0.8 })
);
handleMesh.position.y = 0.4;
handleMesh.castShadow = true;
handleGroup.add(handleMesh);

const handleRing = new THREE.Mesh(
  new THREE.RingGeometry(0.6, 0.8, 48),
  new THREE.MeshBasicMaterial({ color: 0xff7a2f, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
);
handleRing.rotation.x = -Math.PI / 2;
handleRing.position.y = 0.02;
handleGroup.add(handleRing);
scene.add(handleGroup);

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.4);
const dragPoint = new THREE.Vector3();

let ws = null;
let dragActive = false;
let currentMode = "virtual";
let dummyCount = 0;
let lastHandleSendAt = 0;
const avatars = new Map();
const logEntries = [];
let idMappings = {};
let dummies = [];
let selectedDummyIndex = null;

function unityToViewPosition(x, y, z) {
  return { x, y, z: -z };
}

function viewToUnityPosition(x, y, z) {
  return { x, y, z: -z };
}

function defaultWsUrl() {
  if (location.hostname && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
    return `ws://${location.hostname}:8765`;
  }
  return "ws://localhost:8765";
}

function setStatus(text) {
  document.getElementById("status-text").textContent = `${text} | dummy ${dummyCount}`;
}

function addLog(message) {
  logEntries.unshift(`${new Date().toLocaleTimeString()} ${message}`);
  while (logEntries.length > 30) logEntries.pop();
  document.getElementById("event-log").innerHTML = logEntries
    .map(entry => `<div class="log-entry">${entry}</div>`)
    .join("");
}

function sendJson(payload) {
  if (!ws || ws.readyState !== 1) return false;
  ws.send(JSON.stringify(payload));
  return true;
}

function spawnDummies(countOverride = null) {
  const countValue = countOverride == null
    ? Number(document.getElementById("dummy-count").value || 0)
    : Number(countOverride);
  const radius = Number(document.getElementById("dummy-radius").value || 0);
  if (!(countValue > 0)) {
    addLog("spawn ignored: invalid count");
    return;
  }
  if (!sendJson({
    action: "spawn_dummies",
    count: countValue,
    centerX: handleGroup.position.x,
    centerZ: viewToUnityPosition(0, 0, handleGroup.position.z).z,
    radius
  })) {
    addLog("spawn ignored: websocket disconnected");
    return;
  }
  addLog(`spawn requested: ${countValue}`);
}

function clearDummies() {
  if (!sendJson({ action: "despawn_dummies" })) {
    addLog("clear ignored: websocket disconnected");
    return;
  }
  selectedDummyIndex = null;
  updateSelectionUi();
  addLog("despawn requested");
}

function sendHandleTarget(final = false) {
  const unityTarget = viewToUnityPosition(handleGroup.position.x, 0, handleGroup.position.z);
  const payload = {
    action: selectedDummyIndex != null ? "move_one_to" : "move_dummies_to",
    x: unityTarget.x,
    z: unityTarget.z
  };
  if (selectedDummyIndex != null) payload.index = selectedDummyIndex;
  if (!sendJson(payload)) {
    return;
  }
  if (final) {
    addLog(`move target ${unityTarget.x.toFixed(2)}, ${unityTarget.z.toFixed(2)}`);
  }
}

function createLabelSprite(text) {
  const labelCanvas = document.createElement("canvas");
  labelCanvas.width = 256;
  labelCanvas.height = 96;
  const ctx = labelCanvas.getContext("2d");
  ctx.fillStyle = "rgba(15, 17, 21, 0.75)";
  ctx.fillRect(0, 0, labelCanvas.width, labelCanvas.height);
  ctx.strokeStyle = "rgba(143, 183, 255, 0.8)";
  ctx.strokeRect(2, 2, labelCanvas.width - 4, labelCanvas.height - 4);
  ctx.fillStyle = "#f2f6fb";
  ctx.font = "bold 44px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, labelCanvas.width / 2, labelCanvas.height / 2);
  const texture = new THREE.CanvasTexture(labelCanvas);
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(material);
  sprite.scale.set(1.8, 0.68, 1);
  return sprite;
}

function setCastShadow(object) {
  object.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
}

function createAvatarGroup(clientNo) {
  const group = new THREE.Group();
  group.userData.clientNo = clientNo;

  const virtualAnchor = new THREE.Group();
  const physicalAnchor = new THREE.Group();
  const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xd6dbe3, roughness: 0.42, metalness: 0.03 });
  const handMaterial = new THREE.MeshStandardMaterial({ color: 0xf0f3f7, roughness: 0.36 });
  const physicalMaterial = new THREE.MeshStandardMaterial({ color: 0xb9c6d8, transparent: true, opacity: 0.25 });

  const virtualBody = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.9, 16), bodyMaterial);
  virtualBody.position.y = -0.45;
  const virtualHead = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 16), bodyMaterial);
  const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 12), handMaterial);
  const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 12), handMaterial);
  virtualAnchor.add(virtualBody, virtualHead, rightHand, leftHand);
  setCastShadow(virtualAnchor);

  const physicalBody = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.9, 16), physicalMaterial.clone());
  physicalBody.position.y = -0.45;
  const physicalHead = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 16), physicalMaterial.clone());
  const physicalRing = new THREE.Mesh(
    new THREE.RingGeometry(0.28, 0.38, 32),
    new THREE.MeshBasicMaterial({ color: 0x8fb7ff, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
  );
  physicalRing.rotation.x = -Math.PI / 2;
  physicalRing.position.y = -1.05;
  const selectionRing = new THREE.Mesh(
    new THREE.RingGeometry(0.4, 0.58, 40),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
  );
  selectionRing.rotation.x = -Math.PI / 2;
  selectionRing.position.y = -1.03;
  selectionRing.visible = false;
  physicalAnchor.add(physicalBody, physicalHead, physicalRing);
  group.add(selectionRing);

  const label = createLabelSprite(`#${clientNo}`);
  group.add(virtualAnchor, physicalAnchor, label);
  scene.add(group);

  group.userData = {
    ...group.userData,
    virtualAnchor,
    physicalAnchor,
    rightHand,
    leftHand,
    label,
    physicalMaterials: [physicalBody.material, physicalHead.material],
    selectionRing
  };

  applyModeToAvatar(group);
  return group;
}

function applyModeToAvatar(group) {
  const { virtualAnchor, physicalAnchor, physicalMaterials } = group.userData;
  const showVirtual = currentMode !== "physical";
  const showPhysical = currentMode !== "virtual";
  const physicalOpacity = currentMode === "physical" ? 1.0 : 0.25;

  virtualAnchor.visible = showVirtual;
  physicalAnchor.visible = showPhysical;
  physicalMaterials.forEach(material => {
    material.transparent = physicalOpacity < 1;
    material.opacity = physicalOpacity;
  });
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(button => {
    button.classList.toggle("active", button.dataset.mode === mode);
  });
  avatars.forEach(group => applyModeToAvatar(group));
}

function updateAvatar(client) {
  if (!client.head?.pos) return;
  const clientNo = String(client.clientNo);
  const group = avatars.get(clientNo) || createAvatarGroup(clientNo);
  avatars.set(clientNo, group);

  const head = client.head.pos;
  const right = client.right?.relPos || { x: 0.28, y: -0.34, z: 0.2 };
  const left = client.left?.relPos || { x: -0.28, y: -0.34, z: 0.2 };
  const physical = client.physical?.pos || head;
  const headView = unityToViewPosition(head.x, head.y, head.z);
  const physicalView = unityToViewPosition(physical.x, physical.y, physical.z);

  group.userData.virtualAnchor.position.set(headView.x, headView.y, headView.z);
  group.userData.rightHand.position.set(right.x, right.y, -right.z);
  group.userData.leftHand.position.set(left.x, left.y, -left.z);

  group.userData.physicalAnchor.position.set(physicalView.x, physicalView.y, physicalView.z);
  group.userData.label.position.set(headView.x, headView.y + 0.7, headView.z);
  group.userData.selectionRing.position.set(physicalView.x, Math.max(0.02, physicalView.y - 1.02), physicalView.z);
}

function removeAvatar(clientNo) {
  const key = String(clientNo);
  const group = avatars.get(key);
  if (!group) return;
  scene.remove(group);
  avatars.delete(key);
}

function getDummyClientNo(dummyIndex) {
  const dummy = dummies[dummyIndex];
  if (!dummy) return null;
  for (const [cno, mapping] of Object.entries(idMappings)) {
    if (mapping.deviceId === dummy.deviceId) return Number(cno);
  }
  return null;
}

function getDummyIndexByClientNo(clientNo) {
  const mapping = idMappings[String(clientNo)];
  if (!mapping?.deviceId) return null;
  const index = dummies.findIndex(dummy => dummy.deviceId === mapping.deviceId);
  return index >= 0 ? index : null;
}

function updateSelectionUi() {
  const hasSelection = selectedDummyIndex != null && !!dummies[selectedDummyIndex];
  document.getElementById("selection-text").textContent = `Selected: ${hasSelection ? `Dummy #${selectedDummyIndex}` : "(none)"}`;
  document.getElementById("remove-btn").disabled = !hasSelection;
  document.getElementById("deselect-btn").disabled = !hasSelection;
  updateSelectionHighlight();
}

function updateSelectionHighlight() {
  const selectedClientNo = selectedDummyIndex != null ? getDummyClientNo(selectedDummyIndex) : null;
  avatars.forEach((group, clientNo) => {
    group.userData.selectionRing.visible = Number(clientNo) === selectedClientNo;
  });
}

function setSelectedDummy(index) {
  selectedDummyIndex = selectedDummyIndex === index ? null : index;
  updateSelectionUi();
}

function removeSelectedDummy() {
  if (selectedDummyIndex == null) {
    addLog("remove ignored: no selection");
    return;
  }
  if (!sendJson({ action: "despawn_one", index: selectedDummyIndex })) {
    addLog("remove ignored: websocket disconnected");
    return;
  }
  selectedDummyIndex = null;
  updateSelectionUi();
  addLog("despawn one requested");
}

function handleMessage(msg) {
  switch (msg.type) {
    case "room_pose": {
      const alive = new Set();
      for (const client of msg.clients || []) {
        if (!client.head?.pos) continue;
        alive.add(String(client.clientNo));
        updateAvatar(client);
      }
      for (const clientNo of [...avatars.keys()]) {
        if (!alive.has(clientNo)) removeAvatar(clientNo);
      }
      updateSelectionHighlight();
      break;
    }
    case "id_mapping":
      idMappings = {};
      for (const mapping of msg.mappings || []) idMappings[mapping.clientNo] = mapping;
      updateSelectionHighlight();
      addLog(`id_mapping ${msg.mappings?.length || 0}`);
      break;
    case "global_var_sync":
      addLog(`global_var_sync ${msg.variables?.length || 0}`);
      break;
    case "client_var_sync":
      addLog(`client_var_sync ${Object.keys(msg.clientVariables || {}).length}`);
      break;
    case "dummy_status":
      dummyCount = Number(msg.count || 0);
      setStatus(ws && ws.readyState === 1 ? "Connected" : "Disconnected");
      addLog(`dummy_status ${dummyCount}`);
      break;
    case "dummy_list":
      dummies = msg.dummies || [];
      dummyCount = Number(msg.count || dummies.length || 0);
      if (selectedDummyIndex !== null && selectedDummyIndex >= dummies.length) {
        selectedDummyIndex = null;
      }
      updateSelectionUi();
      setStatus(ws && ws.readyState === 1 ? "Connected" : "Disconnected");
      addLog(`dummy_list ${dummyCount}`);
      break;
    case "nv_snapshot":
      dummyCount = Number(msg.dummyCount || 0);
      idMappings = {};
      for (const mapping of msg.idMappings || []) idMappings[mapping.clientNo] = mapping;
      dummies = msg.dummies || [];
      if (selectedDummyIndex !== null && selectedDummyIndex >= dummies.length) {
        selectedDummyIndex = null;
      }
      updateSelectionUi();
      setStatus(ws && ws.readyState === 1 ? "Connected" : "Disconnected");
      addLog(`snapshot dummy ${dummyCount}`);
      break;
    case "rpc":
      addLog(`rpc #${msg.senderClientNo} ${msg.functionName}`);
      break;
  }
}

function connect() {
  const url = (document.getElementById("ws-url").value || "").trim() || defaultWsUrl();
  if (ws && ws.readyState <= 1) ws.close();
  ws = new WebSocket(url);
  setStatus("Connecting");
  ws.onopen = () => {
    setStatus("Connected");
    addLog(`connected ${url}`);
    sendJson({ action: "get_snapshot" });
  };
  ws.onclose = () => {
    setStatus("Disconnected");
    addLog("socket closed");
  };
  ws.onerror = () => addLog("socket error");
  ws.onmessage = event => handleMessage(JSON.parse(event.data));
}

function openConsole() {
  window.location.href = new URL("NetSyncWebClient.html", window.location.href).toString();
}

function updatePointer(event) {
  const rect = canvas.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
}

function getGroundPoint(event) {
  updatePointer(event);
  raycaster.setFromCamera(pointer, camera);
  return raycaster.ray.intersectPlane(dragPlane, dragPoint)
    ? dragPoint.clone()
    : null;
}

function sendGroundTarget(point, additive = false) {
  handleGroup.position.set(point.x, 0, point.z);
  const unityTarget = viewToUnityPosition(point.x, 0, point.z);
  const payload = {
    action: additive
      ? (selectedDummyIndex != null ? "add_waypoint_one" : "add_waypoint")
      : (selectedDummyIndex != null ? "move_one_to" : "move_dummies_to"),
    x: unityTarget.x,
    z: unityTarget.z,
  };
  if (selectedDummyIndex != null) payload.index = selectedDummyIndex;
  if (!sendJson(payload)) return false;
  addLog(`${additive ? "waypoint" : "move"} target ${unityTarget.x.toFixed(2)}, ${unityTarget.z.toFixed(2)}`);
  return true;
}

canvas.addEventListener("pointerdown", event => {
  updatePointer(event);
  raycaster.setFromCamera(pointer, camera);
  const hit = raycaster.intersectObject(handleMesh, false)[0];
  if (!hit) return;
  dragActive = true;
  controls.enabled = false;
  canvas.setPointerCapture(event.pointerId);
});

canvas.addEventListener("pointermove", event => {
  if (!dragActive) return;
  updatePointer(event);
  raycaster.setFromCamera(pointer, camera);
  if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
    handleGroup.position.set(dragPoint.x, 0, dragPoint.z);
    const now = performance.now();
    if (now - lastHandleSendAt >= 1000 / 30) {
      lastHandleSendAt = now;
      sendHandleTarget(false);
    }
  }
});

canvas.addEventListener("pointerup", event => {
  if (!dragActive) return;
  dragActive = false;
  controls.enabled = true;
  canvas.releasePointerCapture(event.pointerId);
  sendHandleTarget(true);
});

canvas.addEventListener("click", event => {
  if (dragActive) return;
  updatePointer(event);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  const hit = hits.find(entry => {
    let current = entry.object;
    while (current) {
      if (current.userData?.clientNo != null) return true;
      current = current.parent;
    }
    return false;
  });
  if (hit) {
    let current = hit.object;
    while (current && current.userData?.clientNo == null) current = current.parent;
    const clientNo = current?.userData?.clientNo;
    const dummyIndex = clientNo != null ? getDummyIndexByClientNo(clientNo) : null;
    if (dummyIndex != null) {
      setSelectedDummy(dummyIndex);
      return;
    }
  }

  const point = getGroundPoint(event);
  if (!point) return;
  sendGroundTarget(point, event.shiftKey);
});

canvas.addEventListener("dblclick", event => {
  updatePointer(event);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  const hit = hits.find(entry => {
    let current = entry.object;
    while (current) {
      if (current.userData?.clientNo != null) return true;
      current = current.parent;
    }
    return false;
  });
  if (!hit) return;
  let current = hit.object;
  while (current && current.userData?.clientNo == null) current = current.parent;
  const clientNo = current?.userData?.clientNo;
  const dummyIndex = clientNo != null ? getDummyIndexByClientNo(clientNo) : null;
  if (dummyIndex == null) return;
  if (!sendJson({ action: "despawn_one", index: dummyIndex })) return;
  if (selectedDummyIndex === dummyIndex) selectedDummyIndex = null;
  updateSelectionUi();
  addLog("despawn one requested");
});

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById("ws-url").value = defaultWsUrl();
document.getElementById("connect-btn").addEventListener("click", connect);
document.getElementById("open-console-btn").addEventListener("click", openConsole);
document.getElementById("spawn-btn").addEventListener("click", () => spawnDummies());
document.getElementById("spawn-50-btn").addEventListener("click", () => spawnDummies(50));
document.getElementById("clear-btn").addEventListener("click", clearDummies);
document.getElementById("remove-btn").addEventListener("click", removeSelectedDummy);
document.getElementById("deselect-btn").addEventListener("click", () => {
  selectedDummyIndex = null;
  updateSelectionUi();
});
document.querySelectorAll(".mode-btn").forEach(button => {
  button.addEventListener("click", () => setMode(button.dataset.mode));
});

function animate(timeMs) {
  requestAnimationFrame(animate);
  const time = timeMs * 0.001;
  handleMesh.material.emissiveIntensity = 0.65 + Math.sin(time * 3.5) * 0.2;
  handleRing.rotation.z = time * 0.8;
  const pulse = 1 + Math.sin(time * 3.2) * 0.12;
  handleRing.scale.setScalar(pulse);
  handleRing.material.opacity = 0.45 + Math.sin(time * 3.2) * 0.12;
  controls.update();
  renderer.render(scene, camera);
}

setStatus("Disconnected");
updateSelectionUi();
addLog("viewer ready");
requestAnimationFrame(animate);
</script>
</body>
</html>
